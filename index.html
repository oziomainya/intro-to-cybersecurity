    */

    ],


    /*

    */

    skills: [
      "Threat Landscape Analysis", "Attack Classification", "Social Engineering Awareness",
      "Malware Types", "CIA Triad", "Data Protection", "Authentication Methods",
      "Encryption Fundamentals", "Security Policies", "Incident Response",
      "Security Frameworks", "Cybersecurity Career Pathways", "Risk Awareness",
    ],


    /*
    -- PARTS -------------------------------------------------
    Each part corresponds to one course module.
    title    = the module topic
    subtitle = short description of what this part covers
    content  = the body of the section -- your research and analysis
    You can expand the content fields with your own findings.
    */

    parts: [
      {
        module:   "PART 01",
        title:    "The Cybersecurity Landscape",
        subtitle: "What cybersecurity is, why it matters, and the current state of threats globally",
        content: [
          {
            heading: "What Is Cybersecurity?",
            body: "Cybersecurity is the practice of protecting systems, networks, and programs from digital attacks. These attacks typically aim to access, change, or destroy sensitive information, extort money from users, or interrupt normal business operations. As more of the world moves online, the attack surface grows larger and the consequences of a breach grow more severe.",
          },
          {
            heading: "The Scale of the Problem",
            body: "Cybercrime is now one of the fastest-growing criminal activities globally. The 2021 World Economic Forum Global Risks Report listed cybersecurity failure among the top five global risks alongside extreme weather and infectious diseases. Organisations of every size are targeted, including multinational corporations, small businesses, schools, and hospitals. No sector is immune. The cost of cybercrime globally is projected to reach trillions of dollars annually, accounting for data theft, financial fraud, system downtime, and reputational damage.",
          },
          {
            heading: "Why the Skills Gap Matters",
            body: "Despite the growing threat, the cybersecurity workforce cannot keep up. Millions of cybersecurity positions worldwide are expected to remain unfilled due to a critical skills gap. This creates both a risk for organisations and an opportunity for professionals entering the field. Governments, academic institutions, and private companies are all investing heavily in cybersecurity training programmes to address this gap.",
          },
          {
            heading: "Current Threat Trends",
            body: "The modern threat landscape is characterised by several persistent trends: ransomware attacks targeting critical infrastructure, nation-state sponsored espionage, supply chain attacks that compromise trusted software vendors, and the weaponisation of artificial intelligence by threat actors. The shift to remote work has significantly expanded the attack surface, with home networks and personal devices becoming entry points to corporate systems.",
          },
        ],
      },
      {
        module:   "PART 02",
        title:    "Attacks, Concepts and Techniques",
        subtitle: "How threat actors operate, and the most common attack methods used against individuals and organisations",
        content: [
          {
            heading: "Threat Actors",
            body: "Not all attackers are the same. Threat actors range from opportunistic script kiddies using pre-built tools, to organised criminal groups running ransomware-as-a-service operations, to state-sponsored advanced persistent threat (APT) groups conducting long-term espionage. Understanding who is attacking and why helps organisations prioritise their defences. Motivations include financial gain, espionage, hacktivism, sabotage, and in some cases simple curiosity.",
          },
          {
            heading: "Malware",
            body: "Malware, short for malicious software, is one of the most common attack vectors. Key types include: viruses, which attach to legitimate files and spread when those files are executed; worms, which self-replicate across networks without user interaction; trojans, which disguise themselves as legitimate software; ransomware, which encrypts data and demands payment for decryption; spyware, which silently collects information about the user; and adware, which delivers unwanted advertisements and may track browsing activity.",
          },
          {
            heading: "Social Engineering",
            body: "Social engineering attacks exploit human psychology rather than technical vulnerabilities. Phishing is the most widespread. It involves sending deceptive emails or messages that trick users into revealing credentials or clicking malicious links. Spear phishing targets specific individuals with personalised messages. Vishing (voice phishing) uses phone calls. Pretexting involves creating a fabricated scenario to extract information. Baiting offers something enticing, such as a free download, or a USB drive that delivers malware. The common thread is manipulation: attackers exploit trust, urgency, and fear.",
          },
          {
            heading: "Network Attacks",
            body: "Denial of Service (DoS) attacks flood a target with traffic to make it unavailable. Distributed DoS (DDoS) attacks amplify this by using a botnet, a network of compromised machines. Man-in-the-Middle (MitM) attacks intercept communications between two parties without their knowledge, often on unsecured public Wi-Fi. Packet sniffing captures network traffic in transit. IP spoofing forges packet headers to impersonate a trusted source. Replay attacks capture and retransmit valid authentication data to gain unauthorised access.",
          },
          {
            heading: "Application Attacks",
            body: "Web applications are a major attack surface. SQL injection inserts malicious code into input fields to manipulate database queries and extract sensitive data. Cross-site scripting (XSS) injects client-side scripts into web pages viewed by other users. Buffer overflow attacks send more data to a program than it can handle, overwriting adjacent memory. Zero-day exploits target vulnerabilities that the vendor has not yet patched, making them particularly dangerous since no fix exists at the time of the attack.",
          },
        ],
      },
      {
        module:   "PART 03",
        title:    "Protecting Your Data and Privacy",
        subtitle: "How individuals can protect personal data, secure accounts, and maintain online privacy",
        content: [
          {
            heading: "Understanding Personal Data",
            body: "Personal data includes anything that can identify an individual, such as name, address, date of birth, financial details, health records, location data, and online behaviour. This data is highly valuable to cybercriminals, advertisers, and nation-states alike. Once exposed, personal data can be used for identity theft, financial fraud, targeted phishing, blackmail, and account takeover. The first step to protection is understanding what data you are generating and who has access to it.",
          },
          {
            heading: "Authentication and Passwords",
            body: "Weak or reused passwords remain one of the most exploited vulnerabilities. Strong passwords should be long (12+ characters), complex, and unique to each account. Password managers generate and store strong passwords securely. Multi-factor authentication (MFA) adds a second verification step. It could be a code sent to a phone, a biometric scan, or a hardware token that significantly reduces the risk of account compromise even when a password is stolen. MFA should be enabled on every account that supports it.",
          },
          {
            heading: "Encryption",
            body: "Encryption converts readable data into an unreadable format that can only be reversed with the correct key. It protects data at rest (stored files, databases), in transit (data moving across networks), and in use. HTTPS encrypts web traffic between a browser and a server. End-to-end encryption in messaging apps ensures only the sender and receiver can read messages. Full disk encryption protects data on devices that are lost or stolen. Understanding encryption is fundamental because it is the technical backbone of most data protection measures.",
          },
          {
            heading: "Safe Online Practices",
            body: "Practical online safety measures include: keeping operating systems and software updated to close known vulnerabilities; using a VPN on public Wi-Fi to encrypt traffic; being cautious with email attachments and links even from known senders; reviewing app permissions on mobile devices; using privacy-focused browsers and search engines; enabling automatic backups to protect against data loss; and regularly reviewing account activity and connected applications for signs of unauthorised access.",
          },
          {
            heading: "Data Backups and Recovery",
            body: "The 3-2-1 backup rule is a well-established standard: keep at least three copies of data, on two different storage media, with one copy stored offsite or in the cloud. Regular backups are the single most effective defence against ransomware. If your data is backed up securely, a ransomware attack loses most of its leverage. Backups should be tested regularly to confirm they can actually be restored when needed.",
          },
        ],
      },
      {
        module:   "PART 04",
        title:    "Protecting the Organisation",
        subtitle: "How organisations build a security posture using policies, frameworks, controls, and response plans",
        content: [
          {
            heading: "The CIA Triad",
            body: "The CIA triad, which stands for Confidentiality, Integrity, and Availability, is the foundational model for information security. Confidentiality ensures data is only accessible to authorised parties. Integrity ensures data is accurate and has not been tampered with. Availability ensures systems and data are accessible when needed by authorised users. Every security control, policy, and decision can be evaluated against these three properties. A ransomware attack violates all three: it denies access (availability), may corrupt data (integrity), and the threat actor gains access to sensitive information (confidentiality).",
          },
          {
            heading: "Security Policies and Frameworks",
            body: "Organisations use security frameworks to structure their approach to cybersecurity. The NIST Cybersecurity Framework organises security activities into five functions: Identify, Protect, Detect, Respond, and Recover. ISO/IEC 27001 is an international standard for information security management systems. These frameworks provide a common language and a structured approach to managing cybersecurity risk. Security policies such as acceptable use, password management, incident response, data classification translate framework principles into enforceable rules.",
          },
          {
            heading: "Access Control and Least Privilege",
            body: "Access control limits who can view or use resources. The principle of least privilege states that every user, system, and process should have access only to the resources it needs to perform its function, nothing more. Role-based access control (RBAC) assigns permissions based on job roles rather than individual users. These controls reduce the blast radius of a breach. If an attacker compromises a low-privilege account, they cannot immediately access critical systems.",
          },
          {
            heading: "Security Monitoring and Incident Response",
            body: "Organisations cannot defend what they cannot see. Security monitoring involves collecting and analysing logs, network traffic, and system events to detect anomalies and potential incidents. A Security Operations Centre (SOC) is a team dedicated to continuous monitoring and response. When an incident is detected, a structured incident response plan guides the organisation through six phases: Preparation, Identification, Containment, Eradication, Recovery, and Lessons Learned. The goal is to minimise damage, restore operations, and prevent recurrence.",
          },
          {
            heading: "Legal and Ethical Responsibilities",
            body: "Organisations operating in different jurisdictions face legal obligations around data protection and breach notification. The EU's General Data Protection Regulation (GDPR) requires organisations to report data breaches within 72 hours and gives individuals rights over their personal data. The Computer Fraud and Abuse Act (CFAA) in the United States criminalises unauthorised access to computer systems. Cybersecurity professionals must operate within legal and ethical boundaries. This includes obtaining proper authorisation before testing, respecting privacy, and reporting findings responsibly.",
          },
        ],
      },
      {
        module:   "PART 05",
        title:    "Will Your Future Be in Cybersecurity?",
        subtitle: "Cybersecurity career pathways, key roles, certifications, and how to get started",
        content: [
          {
            heading: "The Opportunity",
            body: "Cybersecurity is one of the fastest-growing career fields in technology. With millions of unfilled positions globally, skilled professionals are in high demand across every industry, including finance, healthcare, government, retail, and critical infrastructure. Entry-level roles are accessible with foundational certifications and a portfolio of practical skills. The field rewards continuous learning. As threats evolve, so do the skills required, making cybersecurity a career with long-term relevance and growth potential.",
          },
          {
            heading: "Key Career Roles",
            body: "Entry-level roles include Cybersecurity Analyst (monitoring alerts and investigating incidents), Security Operations Centre (SOC) Analyst Tier 1 (triage and escalation), and IT Support Specialist with a security focus. Mid-level roles include Penetration Tester, Incident Responder, Security Engineer, and Threat Intelligence Analyst. Senior roles include Security Architect, Chief Information Security Officer (CISO), and Red Team Lead. Most professionals specialise over time in either offensive security (ethical hacking, penetration testing) or defensive security (SOC, threat hunting, forensics).",
          },
          {
            heading: "Certifications and Learning Pathways",
            body: "Entry-level certifications include CompTIA Security+, Cisco CCST Cybersecurity, and (ISC)2 CC (Certified in Cybersecurity). Intermediate certifications include CompTIA CySA+, Cisco CyberOps Associate, and CEH (Certified Ethical Hacker). Advanced certifications include OSCP (Offensive Security Certified Professional), CISSP (Certified Information Systems Security Professional), and Cisco CyberOps Professional. The Cisco Junior Cybersecurity Analyst career path provides direct preparation for the CCST Cybersecurity certification and entry-level roles.",
          },
          {
            heading: "Building a Portfolio",
            body: "Certifications demonstrate knowledge, but a portfolio demonstrates ability. Practical skills can be developed through home labs (virtual machines, Packet Tracer, GNS3), Capture the Flag (CTF) competitions, TryHackMe and Hack The Box platforms, open source contributions, and documented project work. Uploading projects to GitHub, writing technical write-ups, and maintaining a professional LinkedIn presence are all effective ways to demonstrate skills to employers. This project is part of that portfolio.",
          },
        ],
      },
    ],


    /*
    -- REFLECTIONS ------------------------------------------
    Your personal reflections on completing this course.
    Rewrite in your own words -- this is the most personal section.
    */

    reflections: [
      {
        title: "Cybersecurity is everyone's responsibility",
        text:  "Cybersecurity is not just an IT problem. Social engineering attacks target people, not systems. The weakest link in any organisation's security posture is usually a human one. Understanding how attackers exploit psychology using urgency, trust, and fear is just as important as understanding technical vulnerabilities.",
      },
      {
        title: "The threat landscape is constantly evolving",
        text:  "The threat environment rapidly changes. Attack techniques that were cutting-edge five years ago are now automated and accessible to low-skill attackers. Staying current is not optional in this field because it is a core part of the job.",
      },
      {
        title: "Frameworks give structure to what feels overwhelming",
        text:  "The NIST Cybersecurity Framework and the CIA triad are very practically useful concepts. They provide a structured way to think about any security problem; what needs to be protected, from whom, and how. These frameworks appear consistently across the industry.",
      },

        title: "This is the foundation everything else builds on",

    ],

    '<div class="part">' +
      '<div class="part-header">' +
        '<div class="part-module">' + p.module + '</div>' +
        '<div class="part-title">' + p.title + '</div>' +
        '<div class="part-subtitle">' + p.subtitle + '</div>' +
      '</div>' +
      '<div class="part-body">' + blocks + '</div>' +
    '</div>';
});

var rl = document.getElementById('reflections-list');
PROJECT.reflections.forEach(function(r, i) {
  rl.innerHTML +=
    '<div class="reflection">' +
      '<div class="reflection-n">REFLECTION ' + String(i+1).padStart(2,'0') + '</div>' +
      '<div class="reflection-title">' + r.title + '</div>' +
      '<div class="reflection-text">' + r.text + '</div>' +
    '</div>';
});

var lnk = PROJECT.authorLinkedIn
  ? '<a href="' + PROJECT.authorLinkedIn + '" style="color:var(--green-d);text-decoration:none">' + PROJECT.author + '</a>'
  : PROJECT.author;
document.getElementById('footer').innerHTML =
  '<p>' + lnk + ' &nbsp;.&nbsp; CYBERSECURITY PROJECT &nbsp;.&nbsp; CISCO INTRODUCTION TO CYBERSECURITY &nbsp;.&nbsp; <span style="color:var(--green)">LIVE</span></p>';
</script>
